<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Impulse Contenders</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<style>

/* identical CSS as your previous file */

:root{
font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:flex-start;
padding:18px;
background: radial-gradient(circle at top, #0f172a 0%, #020617 55%, #000 100%);
color:#000;
}

.frame{
width:100%;
max-width:760px;
border-radius:26px;
padding:16px;
background: linear-gradient(180deg, #334155 0%, #0b1220 100%);
box-shadow:0 24px 55px rgba(0,0,0,0.65);
border:2px solid rgba(255,255,255,0.05);
}

.card{
border-radius:22px;
padding:18px 18px 16px;
background: linear-gradient(180deg, #2b3a52 0%, #1b2537 100%);
border:1px solid rgba(255,255,255,0.06);
box-shadow: inset 0 0 0 2px rgba(0,0,0,0.25);
}

.header{
display:flex;
justify-content:space-between;
gap:18px;
align-items:flex-start;
margin-bottom:16px;
}

.brand{
display:flex;
gap:14px;
align-items:flex-start;
}

.brand img{
width:78px;
height:78px;
object-fit:contain;
filter:drop-shadow(0 10px 18px rgba(0,0,0,0.55));
}

h1{
font-size:1.55rem;
font-weight:900;
letter-spacing:0.14em;
text-transform:uppercase;
color:#000;
white-space:nowrap;
}

.subtitle{
margin-top:6px;
font-size:0.9rem;
color:#000;
opacity:0.85;
}

.nav{
margin-top:10px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.nav a{
text-decoration:none;
padding:6px 14px;
border-radius:999px;
font-size:0.8rem;
font-weight:800;
letter-spacing:0.05em;
background:#1e293b;
color:#cbd5e1;
border:1px solid rgba(255,255,255,0.15);
transition:0.15s ease;
}

.nav a.active{
background:#3b82f6;
color:#0b1220;
border-color:#60a5fa;
}

.meta{
text-align:right;
font-size:0.95rem;
color:#000;
opacity:0.85;
line-height:1.55;
white-space:nowrap;
}

</style>
</head>

<body>
<main class="frame">
<section class="card">

<div class="header">
<div class="brand">
<img src="logo.png" alt="Impulse Logo">
<div>

<h1>Impulse Contenders</h1>

<div class="subtitle">
Live standings will be updated ASAP by GameFlame
</div>

<div class="nav">
<a href="index.html">Overdrive</a>
<a href="catalyst.html">Catalyst</a>
<a class="active" href="contenders.html">Contenders</a>
</div>

</div>
</div>

<div class="meta">
Season: <strong>1</strong><br>
Last updated: <strong id="last-updated">—</strong>
</div>
</div>

</section>
</main>

</body>
</html>
